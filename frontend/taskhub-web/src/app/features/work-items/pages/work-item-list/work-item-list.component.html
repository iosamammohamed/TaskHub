<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="container">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">My Tasks</h1>
    <p-button label="Create New Task" icon="pi pi-plus" [routerLink]="['/work-items/new']"></p-button>
  </div>


  <div class="filters-card p-4 shadow-sm border rounded-lg bg-white mb-6">
    <div class="flex flex-wrap gap-4 items-center">
      <div class="flex-1 min-w-[300px]">
        <p-iconfield>
          <p-inputicon class="pi pi-search"></p-inputicon>
          <input type="text" pInputText placeholder="Search tasks..." [(ngModel)]="searchTerm"
            (keyup.enter)="loadData()" class="w-full" />
        </p-iconfield>
      </div>

      <div class="status-box">
        <p-select [(ngModel)]="statusFilter" (onChange)="loadData()" [options]="[
            {label: 'All Statuses', value: null},
            {label: 'New', value: 'New'},
            {label: 'In Progress', value: 'InProgress'},
            {label: 'Done', value: 'Done'}
          ]" optionLabel="label" optionValue="value" placeholder="Select Status" class="w-full md:w-48"></p-select>
      </div>

      <div class="flex gap-2">
        <p-button label="Search" icon="pi pi-search" (onClick)="loadData()"></p-button>
        <p-button label="Reset" icon="pi pi-refresh" severity="secondary" (onClick)="resetFilters()"></p-button>
      </div>
    </div>
  </div>

  <div class="table-card shadow-md border rounded-lg bg-white overflow-hidden">
    <p-table [value]="data?.items ?? []" [paginator]="true" [rows]="10" [totalRecords]="data?.totalCount ?? 0"
      [lazy]="true" (onLazyLoad)="onLazyLoad($event)" [loading]="loading" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Priority</th>
          <th>Due Date</th>
          <th style="width: 12rem" class="text-center">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-item>
        <tr>
          <td><span class="font-medium">{{ item.title }}</span></td>
          <td>
            <p-tag [value]="getStatusName(item.status)" [severity]="getPrimeSeverity(item.status)"></p-tag>
          </td>
          <td>
            <span class="font-semibold" [ngClass]="getPriorityClass(item.priority)">
              {{ getPriorityName(item.priority) }}
            </span>
          </td>
          <td>{{ (item.dueDate | date:'mediumDate') || 'No date' }}</td>
          <td class="text-center">
            <div class="flex justify-center gap-2">
              <p-button icon="pi pi-eye" [text]="true" [routerLink]="['/work-items', item.id]" title="View"></p-button>
              <p-button icon="pi pi-pencil" [text]="true" severity="warn"
                [routerLink]="['/work-items', item.id, 'edit']" title="Edit"></p-button>
              <p-button icon="pi pi-trash" [text]="true" severity="danger" (onClick)="deleteItem(item.id!)"
                title="Delete"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center p-8">
            <div class="flex flex-col items-center gap-4">
              <i class="pi pi-folder-open text-5xl text-gray-300"></i>
              <h3 class="text-xl font-semibold">No tasks found</h3>
              <p class="text-gray-500">Try adjusting your search or filters.</p>
              <p-button label="Clear all filters" (onClick)="resetFilters()" [outlined]="true"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
