<nav class="navbar" *ngIf="authService.isLoggedIn">
    <div class="navbar-container">
        <a routerLink="/" class="navbar-brand">
            <i class="pi pi-check-square"></i>
            <span>TaskHub</span>
        </a>

        <div class="user-section">
            <div class="user-info">
                <span class="user-name">{{ authService.identityClaims?.['name'] || 'User' }}</span>
                <span class="user-email text-xs text-gray-400">{{ authService.identityClaims?.['email'] }}</span>
            </div>
            <p-button label="Sign Out" icon="pi pi-power-off" severity="secondary" [outlined]="true" size="small"
                (onClick)="logout()"></p-button>
        </div>
    </div>
</nav>
